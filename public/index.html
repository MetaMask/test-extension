<!doctype html>
<html dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>MetaMask Test Extension</title>
    <script src="./main.js" defer></script>
  </head>
  <body>
    <header>
      <h1>MetaMask Test Extension</h1>
    </header>
    <main style="display: flex; flex-direction: column; gap: 1em; max-width: 20em;">
      <label>
        Use default extension ID
        <input type="checkbox" id="use-default-id" checked />
      </label>
      <label>
        Extension ID
        <input type="text" id="extension-id" spellcheck="false" disabled />
      </label>
      <button id="initialize">Initialize</button>
      <button id="connect-accounts">Connect Accounts</button>
    </div>
  </main>
</html>
